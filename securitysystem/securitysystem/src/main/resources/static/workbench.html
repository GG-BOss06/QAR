<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>数据工作台 - QAR 安全系统</title>
    <link rel="stylesheet" href="/assets/app.css" />
    <script src="/assets/meteor.js"></script>
  </head>
  <body>
    <div class="nav">
      <div class="nav-inner">
        <div class="brand">QAR 安全系统</div>
        <a class="link active" href="/workbench">工作台</a>
        <a class="link" href="/feedback">反馈与联系</a>
        <a class="link" id="admin-link" href="/admin" style="display:none">管理后台</a>
        <a class="link" id="admin-data-link" href="/admin-data.html" style="display:none">数据管理</a>
        <a class="link" id="admin-qar-link" href="/admin-flight.html" style="display:none">飞行数据管理</a>
        <div class="spacer"></div>
        <div class="pill" id="me-pill">未登录</div>
        <button class="btn" id="btn-logout">退出</button>
      </div>
    </div>

    <div class="container">
      <!-- 概览卡片 -->
      <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px;">
        <div class="card stats-card">
          <div class="card-h">
            <div class="h2">安全状态</div>
          </div>
          <div class="card-b">
            <div id="crypto-status" class="badge">检查中...</div>
            <div class="stats-desc">数据传输加密</div>
          </div>
        </div>
        <div class="card stats-card">
          <div class="card-h">
            <div class="h2">已上传文件</div>
          </div>
          <div class="card-b">
            <div class="stats-value" id="total-uploads">0</div>
            <div class="stats-desc">个人上传文件</div>
          </div>
        </div>
        <div class="card stats-card">
          <div class="card-h">
            <div class="h2">可用数据</div>
          </div>
          <div class="card-b">
            <div class="stats-value" id="available-data">0</div>
            <div class="stats-desc">可下载数据</div>
          </div>
        </div>
      </div>

      <div class="card" id="profile-card" style="margin-bottom:24px">
        <div class="card-h">
          <div class="row" style="justify-content:space-between;align-items:center">
            <div>
              <div class="h2" style="margin:0">个人信息</div>
              <div class="muted">姓名与工号锁定；可修改所属部门</div>
            </div>
            <a class="btn" href="/feedback?subject=%E6%A1%A3%E6%A1%88%E4%BF%A1%E6%81%AF%E6%9C%89%E8%AF%AF">信息有误</a>
          </div>
        </div>
        <div class="card-b">
          <div class="grid" style="grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));gap:16px">
            <div class="col">
              <div class="label">姓名</div>
              <input class="input" id="pf-name" disabled />
            </div>
            <div class="col">
              <div class="label">工号</div>
              <input class="input" id="pf-no" disabled />
            </div>
            <div class="col">
              <div class="label">航司</div>
              <input class="input" id="pf-airline" disabled />
            </div>
            <div class="col">
              <div class="label">职位</div>
              <input class="input" id="pf-position" disabled />
            </div>
            <div class="col">
              <div class="label">所属部门（可修改）</div>
              <input class="input" id="pf-dept" />
            </div>
            <div class="col">
              <div class="label">&nbsp;</div>
              <button class="btn" id="btn-save-dept">保存部门信息</button>
            </div>
          </div>
        </div>
      </div>

      <div class="grid" id="grid" style="gap:24px">
        <div class="card" id="upload-card">
          <div class="card-h">
            <div class="h2">文件上传</div>
            <div class="muted">服务器端存储明文；传输过程中使用TLS协议加密</div>
          </div>
          <div class="card-b col">
            <div class="col">
              <div class="label">选择文件</div>
              <div class="file-upload-area">
                <input class="input" type="file" id="file" />
                <div class="file-upload-hint">点击或拖拽文件到此处</div>
              </div>
            </div>
            <div class="col">
              <div class="label">访问策略（L-ABE策略）</div>
              <input class="input" id="policy" placeholder="role:user" />
            </div>
            <div class="col">
              <div class="label">归属工号（给对应用户下载）</div>
              <input class="input" id="target-person-no" placeholder="例如：20260001 或 user1" />
            </div>
            <button class="btn primary" id="btn-upload">上传</button>
            <div class="muted" id="upload-result"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-h">
            <div class="row" style="justify-content:space-between;align-items:center">
              <div>
                <div class="h2">飞行数据</div>
                <div class="muted">仅显示与你档案匹配的飞行数据（下载为明文文件）</div>
              </div>
              <button class="btn" id="btn-refresh-data">刷新</button>
            </div>
          </div>
          <div class="card-b">
            <div class="table-responsive">
              <table class="table" id="tbl">
                <thead>
                  <tr>
                    <th>文件名</th>
                    <th>大小</th>
                    <th>策略</th>
                    <th>上传时间</th>
                    <th class="actions">操作</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
            <div class="muted" id="empty" style="display:none;margin-top:10px">暂无数据</div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">
      <div class="t">提示</div>
      <div class="m"></div>
    </div>

    <script src="/assets/common.js"></script>
    <script src="/assets/transport.js"></script>
    <script src="/assets/workbench.js"></script>
  </body>
</html>
