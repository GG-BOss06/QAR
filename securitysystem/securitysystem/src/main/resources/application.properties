spring.application.name=securitysystem
server.port=8101

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# 默认使用PostgreSQL，避免服务重启后丢失文件记录、用户和权限关系。
spring.datasource.url=${APP_DB_URL:jdbc:postgresql://127.0.0.1:5432/qar}
spring.datasource.driverClassName=${APP_DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${APP_DB_USERNAME:postgres}
spring.datasource.password=${APP_DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.connection.CharSet=UTF-8
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

spring.h2.console.enabled=false

app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:CAUCqar}

app.security.cookieName=QAR_SESSION
app.security.cookieSecure=${APP_COOKIE_SECURE:true}
app.security.cookieSameSite=Strict
app.security.sessionTtlMinutes=60

app.person.seedEnabled=true
app.person.seedCsv=classpath:person_seed.csv
